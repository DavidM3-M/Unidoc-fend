server {
    # Railway inyecta $PORT en tiempo de ejecución; el entrypoint lo sustituye con envsubst
    listen ${PORT};

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── Reverse proxy → API (Laravel) ────────────────────────────────────
    # Todas las peticiones del frontend a /api/... se reenvían al backend.
    # Esto elimina CORS y hace que VITE_API_URL=/api funcione en cualquier entorno.
    location /api/ {
        proxy_pass         ${BACKEND_UPSTREAM}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Tiempo generoso para endpoints pesados (exportar Excel, PDFs, etc.)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # ─── Reverse proxy → Storage (archivos subidos) ───────────────────────
    # El frontend construye URLs /storage/... eliminando el prefijo /api de VITE_API_URL.
    location /storage/ {
        proxy_pass         ${BACKEND_UPSTREAM}/storage/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Archivos potencialmente grandes (PDFs, imágenes)
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;

        # Caché de archivos estáticos del storage
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── SPA: redirigir todas las rutas al index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
